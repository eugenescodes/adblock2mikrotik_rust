name: Pipeline

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: LINT & TEST — push / PR / dispatch
  # Fast feedback: no Docker, no network calls.
  # ─────────────────────────────────────────────
  lint-and-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Lint and fix Markdown
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          fix: true
          globs: '**/*.md'
        continue-on-error: true

      - name: Run cargo fmt
        run: cargo fmt --all

      - name: Commit and push formatting fixes
        if: github.event_name == 'push'
        run: |
          export GIT_MERGE_AUTOEDIT=no
          export GIT_TERMINAL_PROMPT=0
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Auto-fix formatting (Markdown & cargo fmt)"
            git pull --rebase --no-edit origin "$BRANCH_NAME"
            git push origin "HEAD:refs/heads/$BRANCH_NAME"
          else
            echo "No formatting changes to commit."
          fi

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Run doc tests
        run: cargo test --doc

  # ─────────────────────────────────────────────
  # JOB 2: DOCKER BUILD CHECK — push to main + dispatch only
  # Skipped on PRs to save CI minutes.
  # ─────────────────────────────────────────────
  docker-build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image with GHA Cache
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: adblock2mikrotik_rust:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image — binary runs, no network
        run: |
          docker run --rm --network none adblock2mikrotik_rust:ci-test --version

  # ─────────────────────────────────────────────
  # JOB 3: UPDATE HOSTS — schedule + dispatch
  # ─────────────────────────────────────────────
  update-hosts:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-cron-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cron-

      - name: Run conversion
      # remove --release for faster execution since this runs frequently
        run: cargo run

      - name: Commit and push hosts.txt
        run: |
          if [[ -n $(git status --porcelain hosts.txt) ]]; then
            git add hosts.txt
            git commit -m "Update hosts.txt via schedule"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi